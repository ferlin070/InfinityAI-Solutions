<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfinityAI Solutions — Daftar Masuk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <!-- Design tokens (colors, fonts, base styles) -->
    <link rel="stylesheet" href="css/tokens.css">
    <!-- Component styles -->
    <link rel="stylesheet" href="css/components.css">
    <!-- Login-specific layout -->
    <link rel="stylesheet" href="css/login.css">
    
    <!-- PWA configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#EFF2F0">
</head>
<body>
<div class="login-container">
    <header class="login-header">
        <div class="wordmark">InfinityAI Solutions</div>
        <h1>Borang Daftar Masuk</h1>
        <p class="login-sub">Sila log masuk untuk mengakses Pejabat Operasi Harian</p>
    </header>

    <main class="card login-card">
        <div class="card-head">
            <h2 class="card-title">Kebenaran Akses</h2>
            <span class="card-note" id="refNo"></span>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email" class="form-label">E-mel Kakitangan</label>
                <input type="email" id="email" name="email" required autocomplete="username" placeholder="kakitangan@infinityai.com">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Kata Laluan</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Kata laluan rahsia">
            </div>

            <div id="errorMessage" class="error-box hidden" role="alert"></div>
            <div id="offlineMessage" class="error-box hidden" style="border-color: var(--stamp); color: var(--stamp); background: rgba(181, 49, 49, 0.05);" role="alert" data-i18n="login-offline">Rangkaian Terputus. Log masuk tidak dapat disahkan.</div>

            <button type="submit" id="submitBtn" class="btn-stamp">
                <span>Log Masuk ke Pejabat</span>
            </button>
        </form>
    </main>

    <footer class="login-footer">
        <p>© 2026 InfinityAI Solutions. Hak Cipta Terpelihara.</p>
    </footer>
</div>

<script src="js/auth.js"></script>
<script>
    // Generate a reference number for the login slip
    document.getElementById('refNo').textContent =
        'LOG/' + new Date().toISOString().slice(0, 10).replace(/-/g, '') + '/' + String(Math.floor(Math.random() * 900) + 100);

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered successfully:', reg.scope))
                .catch(err => console.error('Service Worker registration failed:', err));
        });
    }
</script>
</body>
</html>
