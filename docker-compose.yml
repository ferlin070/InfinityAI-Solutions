version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CREWAI_TESTING=true
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - GATEWAY_INTERNAL_URL=http://gateway-wa:3000
      - GATEWAY_SHARED_SECRET=${GATEWAY_SHARED_SECRET:-dev-secret-change-in-production}
      - PORT=7860
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    depends_on:
      - gateway-wa

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m src.workers.runner
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CREWAI_TESTING=true
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - GATEWAY_INTERNAL_URL=http://gateway-wa:3000
      - GATEWAY_SHARED_SECRET=${GATEWAY_SHARED_SECRET:-dev-secret-change-in-production}
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    depends_on:
      - gateway-wa

  gateway-wa:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - GATEWAY_PORT=3000
      - FASTAPI_WEBHOOK_URL=http://backend:7860/webhooks/wa-gateway
      - GATEWAY_SHARED_SECRET=${GATEWAY_SHARED_SECRET:-dev-secret-change-in-production}
    volumes:
      - gateway_auth:/app/.wwebjs_auth

volumes:
  gateway_auth:
